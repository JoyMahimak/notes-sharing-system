name: Notes Sharing CI

on:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    # ✅ STEP 1: Checkout code (VERY IMPORTANT FIX)
    - name: Checkout code
      uses: actions/checkout@v4

    # ✅ STEP 2: Setup Python
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # ✅ STEP 3: Install dependencies
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt

    # ✅ STEP 4: Run tests
    - name: Run tests
      run: |
        pytest backend