name: Notes Sharing CI

on:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    # ✅ FIXED CHECKOUT (IMPORTANT)
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0   # 🔥 FIXES git error 128

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run tests
      run: |
        pytest