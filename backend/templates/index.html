<!DOCTYPE html>
<html>
<head>
    <title>Notes Sharing System</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f5f5f5;
            padding: 20px;
        }

        .container {
            width: 80%;
            margin: auto;
        }

        h1 {
            text-align: center;
        }

        form {
            margin-bottom: 20px;
        }

        input, button {
            padding: 8px;
            margin: 5px;
        }

        .note {
            background: white;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
        }

        .btn {
            padding: 5px 10px;
            text-decoration: none;
            margin-right: 5px;
        }

        .download { background: green; color: white; }
        .delete { background: red; color: white; }
        .rename { background: orange; color: white; }
    </style>
</head>

<body>

<div class="container">

    <h1>📚 Notes Sharing System</h1>

    <!-- Upload Form -->
    <form action="/upload" method="POST" enctype="multipart/form-data">
        <input type="text" name="title" placeholder="Enter title" required>
        <input type="file" name="file" required>
        <button type="submit">Upload</button>
    </form>

    <!-- 🔍 Search Bar -->
    <form method="GET">
        <input type="text" name="search" placeholder="Search notes...">
        <button type="submit">Search</button>
    </form>

    <h2>Available Notes</h2>

    {% for note in notes %}
    <div class="note">
        <b>{{ note.title }}</b> ({{ note.filename }})

        <br><br>

        <a class="btn download" href="/download/{{ note.filename }}">Download</a>
        <a class="btn delete" href="/delete/{{ note.id }}">Delete</a>

        <!-- Rename -->
        <form action="/rename/{{ note.id }}" method="POST" style="display:inline;">
            <input type="text" name="title" placeholder="New title">
            <button class="rename" type="submit">Rename</button>
        </form>
    </div>
    {% endfor %}

    <br>
    <a href="/logout">Logout</a>

</div>

</body>
</html>
