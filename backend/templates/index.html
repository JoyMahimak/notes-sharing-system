<!DOCTYPE html>
<html>
<head>
    <title>Notes Sharing System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            font-family: 'Segoe UI';
        }
        .card {
            border-radius: 15px;
            transition: 0.3s;
        }
        .card:hover {
            transform: scale(1.02);
        }
    </style>
</head>

<body style="background: linear-gradient(to right, #4facfe, #00f2fe);">

<div class="container mt-5">

    <div class="d-flex justify-content-between align-items-center">
        <h2>📁 Notes Sharing System</h2>
        <a href="/logout" class="btn btn-danger">Logout</a>
    </div>

    <!-- DASHBOARD -->
    <div class="row mt-4">
        <div class="col-md-6">
            <div class="card p-3 text-center">
                <h4>Total Notes</h4>
                <h2>{{ total_notes }}</h2>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card p-3 text-center">
                <h4>Favorites ⭐</h4>
                <h2>{{ favorites }}</h2>
            </div>
        </div>
    </div>

    <!-- SEARCH -->
    <form method="GET" action="/home" class="mt-4">
        <input type="text" name="search" class="form-control" placeholder="🔍 Search notes...">
    </form>

    <!-- UPLOAD -->
    <form action="/upload" method="POST" enctype="multipart/form-data" class="mt-3">
        <div class="row">
            <div class="col-md-8">
                <input type="file" name="file" class="form-control" required>
            </div>
            <div class="col-md-4">
                <button class="btn btn-primary w-100">Upload</button>
            </div>
        </div>
    </form>

    <!-- NOTES -->
    {% for note in notes %}
    <div class="card p-3 mt-3 shadow">

        <h5>
            📄 {{ note.title }}
            {% if note.favorite %} ⭐ {% endif %}
        </h5>

        <small>{{ note.created_at }}</small>

        <div class="mt-2">

            <a href="/download/{{ note.filename }}" class="btn btn-success btn-sm">Download</a>

            <a href="/delete/{{ note.id }}" class="btn btn-danger btn-sm">Delete</a>

            <form action="/favorite/{{ note.id }}" method="POST" style="display:inline;">
                <button class="btn btn-warning btn-sm">⭐</button>
            </form>

            <form action="/rename/{{ note.id }}" method="POST" class="mt-2">
                <input type="text" name="new_title" placeholder="Rename" required>
                <button class="btn btn-info btn-sm">Update</button>
            </form>

        </div>

    </div>
    {% endfor %}

</div>

</body>
</html>
