<!DOCTYPE html>
<html>
<head>
    <title>Available Notes</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 30px; }
        h1 { color: #333; }
        a { text-decoration: none; color: #007bff; }
        a:hover { text-decoration: underline; }
        ul { list-style-type: none; padding: 0; }
        li { margin-bottom: 10px; }
        .upload-btn { margin-bottom: 20px; display: inline-block; padding: 10px 15px; background: #28a745; color: white; border-radius: 5px; }
        .upload-btn:hover { background: #218838; }
    </style>
</head>
<body>
    <h1>Available Notes</h1>
    <a class="upload-btn" href="{{ url_for('upload') }}">Upload Notes</a>
    <ul>
        {% for file in files %}
            <li><a href="{{ url_for('download_file', filename=file) }}">{{ file }}</a></li>
        {% endfor %}
    </ul>
</body>
</html>
