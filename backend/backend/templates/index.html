<!DOCTYPE html>
<html lang="en">
<head>
    <title>Notes Sharing System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="background: #f5f7fa;">

<div class="container mt-5">

    <h2 class="text-center mb-4">📚 Notes Sharing System</h2>

    <!-- Upload Card -->
    <div class="card shadow p-4 mb-4">
        <h4>Upload Notes</h4>
        <form action="/upload" method="POST" enctype="multipart/form-data">
            <div class="mb-3">
                <input type="text" name="title" class="form-control" placeholder="Enter title" required>
            </div>
            <div class="mb-3">
                <input type="file" name="file" class="form-control" required>
            </div>
            <button class="btn btn-primary w-100">Upload</button>
        </form>
    </div>

    <!-- Notes List -->
    <div class="card shadow p-4">
        <h4>Your Notes</h4>

        {% if notes %}
            <ul class="list-group">
                {% for note in notes %}
                    <li class="list-group-item d-flex justify-content-between align-items-center">
                        <span>{{ note.title }}</span>
                        <div>
                            <a href="/uploads/{{ note.filename }}" class="btn btn-success btn-sm">Download</a>
                            <a href="/delete/{{ note.id }}" class="btn btn-danger btn-sm">Delete</a>
                        </div>
                    </li>
                {% endfor %}
            </ul>
        {% else %}
            <p class="text-muted">No notes uploaded yet.</p>
        {% endif %}
    </div>

</div>

</body>
</html>
